<html><body><script>
var x = "" + window.location
var y = x.split("github.io/")[0]
var z = x.split("github.io/")[1]
var a = z.split("/")[0]
var root = false
try
{
  var b = z.split("/")[1]
  if(b === "")
  {
    root = true
  }
}
catch(err)
{
  root = true
}
var c = y + "github.io/" + a + "/"
if(root != true){window.location = c}</script>
</body></html>
